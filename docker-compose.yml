

services:
  config-service:
    build: ./config-service
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  discovery-service:
    build: ./discovery-service
    ports:
      - "8761:8761"
    depends_on:
      config-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-service:
    build: ./gateway-service
    ports:
      - "8060:8060"
    depends_on:
      discovery-service:
        condition: service_healthy

  video-service:
    build: ./video-service
    ports:
      - "8081:8081"
    depends_on:
      discovery-service:
        condition: service_healthy

  user-service:
    build: ./user-service
    ports:
      - "8082:8082"
    depends_on:
      discovery-service:
        condition: service_healthy
      video-service:
        condition: service_started
